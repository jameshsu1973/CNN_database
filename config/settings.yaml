# CNN Weight Vault Configuration
# Vector Database Settings

vector_db:
  # Database type: qdrant (currently only qdrant is supported)
  type: qdrant

  # ChromaDB specific settings (local storage)
  chromadb:
    # Path to store ChromaDB persistent data
    persist_directory: "./chroma_db"
    # Collection name for CNN weights
    collection_name: "cnn_weights"
    # Distance metric: cosine, l2, or ip (inner product)
    distance_metric: "cosine"
    # Embedding dimension (will be auto-detected based on weights)
    # This is a fallback value
    embedding_dimension: 512

  # Milvus/Zilliz Cloud specific settings (cloud storage)
  # Get your free cluster at https://zilliz.com
  milvus:
    # Zilliz Cloud cluster URI (e.g., https://inxxx.aws-us-west-2.vectordb.zillizcloud.com)
    uri: "https://inxxx.aws-us-west-2.vectordb.zillizcloud.com"
    # Zilliz Cloud API key or username:password
    token: "your_zilliz_api_key_or_token_here"
    # Collection name prefix for CNN weights
    collection_name: "cnn_weights"

  # Qdrant Cloud specific settings (cloud storage with higher dimension limit)
  # Get your free cluster at https://qdrant.tech
  qdrant:
    # Qdrant Cloud cluster URL (e.g., https://xyz.qdrant.tech)
    url: "https://aee6f6e3-503a-4368-9950-ca7599a12bdf.us-west-1-0.aws.cloud.qdrant.io"
    # Qdrant Cloud API key
    api_key: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJhY2Nlc3MiOiJtIiwic3ViamVjdCI6ImFwaS1rZXk6MzliZjYyZDctNDBiYS00YmU0LWE2NmYtYzNjOGNhNmFiYzkwIn0.vg70l8ab2KNGoKfCjAbOF5mU6JvsjoJF5u3jZ1rvEFg"
    # Collection name prefix for CNN weights
    collection_name: "cnn_weights"

  # Search settings
  search:
    # Default number of results to return
    default_top_k: 3
    # Similarity threshold (0-1, higher is more similar)
    similarity_threshold: 0.85
    # Top-k ratio for weight masking (0-1)
    top_k_ratio: 0.3

# Model settings
model:
  # Default model name
  default_model_name: "default_model"
  # Supported layer types
  supported_layers:
    - Conv2d
    - Linear

# Vault paths (legacy support)
vault:
  # Default vault path for pickle-based storage (backward compatibility)
  default_path: "./vault"
  detection_path: "./detection_vault"

# Logging
logging:
  level: INFO
  show_init_messages: true
